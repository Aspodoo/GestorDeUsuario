<!DOCTYPE html>
<html>
<head>
    <title>Panel Empleado</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="text-center text-primary">Mi Información</h2>

        <table class="table table-bordered text-center mt-3">

            <tr><th>ID</th><td>{{ empleado[0] }}</td></tr>
            <tr><th>Documento</th><td>{{ empleado[1] }}</td></tr>
            <tr><th>Nombre</th><td>{{ empleado[2] }}</td></tr>
            <tr><th>Apellido</th><td>{{ empleado[3] }}</td></tr>
            <tr><th>Cargo</th><td>{{ empleado[4] }}</td></tr>
            <tr><th>Salario</th><td>{{ empleado[5] }}</td></tr>
            <tr><th>Horas Extras</th><td>{{ empleado[6] }}</td></tr>
            <tr><th>Bonificación</th><td>{{ empleado[7] }}</td></tr>
            <tr><th>Área</th><td>{{ empleado[12] }}</td></tr>

        </table>

        <div class="text-center">
            <a href="/editar_empleado/{{ empleado[0] }}" class="btn btn-warning">Editar mis datos</a>
            <a href="/salir" class="btn btn-danger">Cerrar sesión</a>
        </div>

    </div>

</div>

</body>
</html>
