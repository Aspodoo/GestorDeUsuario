<!DOCTYPE html>
<html>
<head>
    <title>Editar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">Editar Usuario</h2>

        <form action="/actualizar" method="POST">

            <!-- ID OCULTO -->
            <input type="hidden" name="id" value="{{ usuario[0] }}">

            <!-- USUARIO -->
            <label>Usuario</label>
            <input type="text" name="usuario" class="form-control mb-2" value="{{ usuario[1] }}" required>

            <!-- CONTRASEÑA -->
            <label>Contraseña</label>
            <input type="text" name="password" class="form-control mb-2" value="{{ usuario[2] }}" required>

            <!-- ROL -->
            <label>Rol</label>
            <select name="rol" class="form-control mb-2">
                <option value="administrador" {% if usuario[3]=="administrador" %}selected{% endif %}>Administrador</option>
                <option value="empleado" {% if usuario[3]=="empleado" %}selected{% endif %}>Empleado</option>
            </select>

            <!-- DOCUMENTO -->
            <label>Documento</label>
            <input type="number" name="documento" class="form-control mb-3" value="{{ usuario[4] }}" required>

            <!-- BOTONES -->
            <button class="btn btn-success">Actualizar</button>
            <a href="/inicio" class="btn btn-secondary">Volver</a>

        </form>

    </div>
</div>

</body>
</html>
