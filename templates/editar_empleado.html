<!DOCTYPE html>
<html>
<head>
    <title>Editar Empleado</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center text-warning">Editar Empleado</h2>

        <form method="POST" action="/actualizar_empleado">

            <input type="hidden" name="id" value="{{ empleado[0] }}">

            <label>Documento</label>
            <input type="number" name="documento" class="form-control mb-2" value="{{ empleado[1] }}" required>

            <label>Nombre</label>
            <input type="text" name="nombre" class="form-control mb-2" value="{{ empleado[2] }}" required>

            <label>Apellido</label>
            <input type="text" name="apellido" class="form-control mb-2" value="{{ empleado[3] }}" required>

            <label>Cargo</label>
            <input type="text" name="cargo" class="form-control mb-2" value="{{ empleado[4] }}" required>

            <label>Salario</label>
            <input type="number" name="salario" class="form-control mb-2" value="{{ empleado[5] }}" required>

            <label>Horas Extras</label>
            <input type="number" name="horas_extras" class="form-control mb-2" value="{{ empleado[6] }}">

            <label>Bonificación</label>
            <input type="number" name="bonificacion" class="form-control mb-2" value="{{ empleado[7] }}">

            <label>Área</label>
            <select name="id_area" class="form-control mb-3">
                <option value="1">Administración</option>
                <option value="2">Cafetería</option>
                <option value="3">Recursos Humanos</option>
                <option value="4">Red de Medios</option>
            </select>

            <button class="btn btn-warning w-100">Actualizar</button>

            <a href="/inicio" class="btn btn-secondary w-100 mt-2">Volver</a>

        </form>

    </div>
</div>

</body>
</html>
